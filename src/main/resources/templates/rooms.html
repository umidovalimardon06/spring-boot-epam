<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rooms</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #111;
            color: #e0e0e0;
            font-family: system-ui, sans-serif;
            font-size: 15px;
            padding: 3rem 2rem;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.3rem;
        }

        .subtitle {
            font-size: 0.82rem;
            color: #555;
            margin-bottom: 2rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            text-align: left;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #555;
            padding: 0.6rem 1rem;
            border-bottom: 1px solid #222;
        }

        tbody tr {
            border-bottom: 1px solid #1e1e1e;
            transition: background 0.15s;
        }

        tbody tr:hover { background: #181818; }

        tbody td {
            padding: 0.85rem 1rem;
            color: #ccc;
            font-size: 0.88rem;
        }

        tbody td:first-child {
            color: #555;
            font-size: 0.8rem;
            width: 100px;
        }

        .empty {
            padding: 3rem 1rem;
            text-align: center;
            color: #444;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
<div class="container">

    <h1>Rooms</h1>
    <p class="subtitle">All available rooms</p>

    <table>
        <thead>
        <tr>
            <th>Number</th>
            <th>Name</th>
            <th>Bed Info</th>
        </tr>
        </thead>
        <tbody>

        <tr th:each="room : ${rooms}">
            <td th:text="${room.number}"></td>
            <td th:text="${room.name}"></td>
            <td th:text="${room.info}"></td>
        </tr>

        <tr th:if="${rooms == null or #lists.isEmpty(rooms)}">
            <td colspan="3" class="empty">No rooms found.</td>
        </tr>

        </tbody>
    </table>

</div>
</body>
</html>
